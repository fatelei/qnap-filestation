linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment
  depguard:
    rules:
      Main:
        allow:
          - $gostd
          - github.com/fatelei/qnap-filestation/.*
        deny: []
      main:
        allow:
          - $gostd
          - github.com/fatelei/qnap-filestation/.*
        deny: []
  staticcheck:
    checks: ["all"]
  stylecheck:
    checks: ["all", "-ST1000", "-ST1003", "-ST1020", "-ST1021", "-ST1022"]
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100
  misspell:
    locale: US
  lll:
    line-length: 140
  goimports:
    local-prefixes: github.com/fatelei/qnap-filestation
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc

linters:
  disable-all: true
  enable:
    - bodyclose
    - errcheck
    - gocyclo
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - typecheck
    - unconvert
    - unused

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude:
    - 'G104'
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst
        - funlen
        - gocognit
        - unused
        - govet
